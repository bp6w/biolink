<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="tiny terminal-themed link page" />
    <meta name="theme-color" content="#0d0d0d" />
    <title>Bio link</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="entry-overlay" class="entry-overlay">
      <div class="entry-content">
        <div class="avatar-container">
          <img src="" alt="" class="avatar" id="avatar-img" />
        </div>
        <h1 class="entry-title" id="entry-title"></h1>
        <p class="entry-subtitle" id="entry-subtitle"></p>
        <button id="btn-enter" class="btn-enter">click here to enter.</button>
        <a href="settings.html" class="entry-settings-link">site settings</a>
      </div>
    </div>

    <div class="bg-gradient" aria-hidden="true"></div>
    <div class="bg-noise" aria-hidden="true"></div>

    <main class="container">
      <header class="header">
        <h1 class="logo" id="site-brand">bio.link</h1>
        <p class="subtitle">Secure connection established.</p>
      </header>

      <section class="terminal-wrapper" role="region" aria-label="Terminal">
        <div class="terminal-header" aria-hidden="true">
          <div class="window-controls">
            <span class="control close"></span>
            <span class="control minimize"></span>
            <span class="control maximize"></span>
          </div>
          <div class="window-title">guest@bio:~</div>
        </div>

        <div class="terminal-body" id="terminal-body">
          <div id="history" class="history" aria-live="polite"></div>
          <form id="command-form" class="command-line" autocomplete="off">
            <span class="prompt-text" id="prompt">guest@bio:~$</span>
            <div class="input-wrapper">
              <input
                id="cmd-input"
                type="text"
                spellcheck="false"
                autocomplete="off"
                autofocus
                aria-label="Enter terminal command"
              />
              <span class="cursor"></span>
            </div>
          </form>
        </div>
      </section>
    </main>

    <audio id="bg-audio" loop preload="auto"></audio>
    <div class="music-player glass-panel" id="music-player" aria-label="Music player" hidden>
      <div class="music-info">
        <div class="music-icon-ring">
          <div class="music-icon">♪</div>
        </div>
        <div class="music-text">
          <div class="music-title" id="music-label">No track selected</div>
          <div class="music-status" id="music-status">Paused</div>
        </div>
      </div>
      <div class="music-controls">
        <button class="icon-btn" id="btn-play" aria-label="Play/Pause">
          <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
          </svg>
          <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
          </svg>
        </button>
        <button class="icon-btn" id="btn-mute" aria-label="Mute/Unmute">
          <svg id="icon-sound" viewBox="0 0 24 24" fill="currentColor">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
          </svg>
          <svg id="icon-mute" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
            <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
          </svg>
        </button>
        <div class="vol-slider-container">
          <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" />
        </div>
      </div>
    </div>

    <script src="config.js"></script>
    <script src="main.js"></script>
  </body>
</html>
